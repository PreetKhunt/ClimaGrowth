name: climagrowth
description: ClimaGrowth – AI-powered farming assistant for farmers in Padra, Gujarat, India.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.20
  firebase_storage: ^11.6.10

  # HTTP / Networking
  dio: ^5.4.3
  http: ^1.2.1
  connectivity_plus: ^5.0.2

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  animations: ^2.0.11
  confetti: ^0.7.0
  glassmorphism: ^3.0.0

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Offline / Cache
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # UI Helpers
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_speed_dial: ^7.0.0
  percent_indicator: ^4.2.3
  intl: ^0.20.2
  url_launcher: ^6.2.6
  universal_platform: ^1.0.0+1
  uuid: ^4.0.0
  flutter_rating_bar: ^4.0.1

  # Premium icon set + transitions (v3 redesign)
  phosphor_flutter: ^2.1.0
  page_transition: ^2.1.0

  # Payments & E-commerce
  razorpay_flutter: ^1.3.7
  pdf: ^3.10.7

  # Text-to-speech (Soil Voice feature)
  flutter_tts: ^4.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Poppins font is loaded via the google_fonts package (no local TTF files needed).
  # To use offline-only fonts, download Poppins from fonts.google.com,
  # place in assets/fonts/, and uncomment the block below:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
